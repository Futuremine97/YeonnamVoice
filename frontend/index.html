<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>English For Us — 원어민 목소리로 영어 회화</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.2/ethers.umd.min.js"></script>
<!-- 백엔드 주소 설정(배포용). Vercel 배포 시 config.js에서 Render 백엔드 URL을 지정 -->
<script src="config.js"></script>
<style>
  :root{
    --bg:#f4f5fb; --ink:#13162a; --mut:#6b7095; --soft:#9aa0c4;
    --line:rgba(18,22,55,.08);
    --acc:#6366f1; --acc2:#8b5cf6; --acc3:#ec4899;
    --grad:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);
    --ok:#10b981; --okbg:#e7f8f1; --warn:#d97706; --warnbg:#fdf3e3; --bad:#e11d48;
    --glass:rgba(255,255,255,.72); --glass2:rgba(255,255,255,.55);
    --shadow:0 10px 40px -12px rgba(54,40,120,.25); --shadow-sm:0 4px 16px -6px rgba(54,40,120,.18);
    --r:20px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);
    background:var(--bg);overflow-x:hidden;-webkit-font-smoothing:antialiased}
  /* 배경 블롭 */
  .blobs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5}
  .b1{width:520px;height:520px;background:#a5b4fc;top:-160px;right:-120px}
  .b2{width:440px;height:440px;background:#f9a8d4;bottom:-160px;left:-120px;opacity:.42}
  .b3{width:360px;height:360px;background:#c4b5fd;top:40%;left:55%;opacity:.32}
  #root{position:relative;z-index:1}

  button{font-family:inherit;cursor:pointer;border:0;border-radius:14px;font-weight:600;transition:.18s}
  input,select,textarea{font-family:inherit}
  .btn{background:var(--grad);color:#fff;padding:12px 20px;font-size:15px;box-shadow:0 8px 20px -8px rgba(124,92,255,.6)}
  .btn:hover{transform:translateY(-1px);box-shadow:0 12px 26px -8px rgba(124,92,255,.7)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
  .btn.ghost{background:#fff;color:var(--ink);box-shadow:var(--shadow-sm)}
  .btn.outline{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
  .btn.sm{padding:8px 15px;font-size:13.5px;border-radius:12px}
  .mut{color:var(--mut)} .ok{color:var(--ok)} .bad{color:var(--bad)}
  .field{background:#fff;border:1.5px solid var(--line);color:var(--ink);border-radius:13px;padding:12px 14px;font-size:15px;width:100%;transition:.18s;outline:none}
  .field:focus{border-color:var(--acc);box-shadow:0 0 0 4px rgba(99,102,241,.12)}
  .pill{font-size:11.5px;color:var(--mut);background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.14);padding:3px 10px;border-radius:999px;font-weight:600}
  .glass{background:var(--glass);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.7);border-radius:var(--r);box-shadow:var(--shadow)}
  .card{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.65);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:20px;transition:.2s}
  .card.hov:hover{transform:translateY(-3px);box-shadow:var(--shadow)}

  /* layout */
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh;gap:0}
  .side{margin:16px 0 16px 16px;padding:20px 14px;display:flex;flex-direction:column;gap:6px;
    background:var(--glass);backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.7);border-radius:24px;box-shadow:var(--shadow);height:calc(100vh - 32px);position:sticky;top:16px}
  .brand{font-weight:800;font-size:19px;padding:8px 12px 18px;letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
  .logo{width:34px;height:34px;border-radius:11px;background:var(--grad);display:grid;place-items:center;color:#fff;font-size:18px;box-shadow:0 6px 14px -4px rgba(124,92,255,.6)}
  .brand small{display:block;font-weight:500;font-size:11px;color:var(--mut);margin-top:1px;letter-spacing:0}
  .nav{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:13px;color:var(--mut);font-weight:600;font-size:14.5px;transition:.15s}
  .nav:hover{background:rgba(99,102,241,.07);color:var(--ink)}
  .nav.on{background:var(--grad);color:#fff;box-shadow:0 8px 18px -8px rgba(124,92,255,.6)}
  .nav .ic{font-size:17px;width:20px;text-align:center}
  .main{padding:30px 36px;max-width:960px;width:100%}
  .h{font-size:27px;font-weight:800;margin:0 0 6px;letter-spacing:-.5px}
  .hsub{color:var(--mut);margin:0 0 22px;font-size:14.5px;line-height:1.5}
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:1fr 1fr}
  @media(max-width:780px){.app{grid-template-columns:1fr}.side{flex-direction:row;flex-wrap:wrap;height:auto;margin:12px;position:static}.brand{width:100%;padding-bottom:8px}.nav{flex:1;justify-content:center}.main{padding:18px}.g2{grid-template-columns:1fr}}

  .tutor{display:flex;gap:15px;align-items:center}
  .ava{width:56px;height:56px;border-radius:18px;display:grid;place-items:center;font-size:21px;font-weight:800;color:#fff;flex:none;box-shadow:0 8px 18px -8px rgba(54,40,120,.5)}
  .price{font-weight:800;color:var(--acc);font-size:15px}
  .tgrid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .tutorcard{display:flex;gap:15px;align-items:flex-start;cursor:pointer;padding:18px;
    background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.65);border-radius:var(--r);box-shadow:var(--shadow-sm);transition:.2s}
  .tutorcard:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:rgba(99,102,241,.35)}
  @media(max-width:780px){.tgrid{grid-template-columns:1fr}}

  /* chat */
  .room{display:flex;flex-direction:column;height:calc(100vh - 60px)}
  .roomhead{display:flex;align-items:center;gap:13px;padding:14px 16px;border-radius:18px;margin-bottom:14px;
    background:var(--glass);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.65);box-shadow:var(--shadow-sm)}
  .log{flex:1;overflow:auto;padding:6px 4px;display:flex;flex-direction:column;gap:16px}
  .log::-webkit-scrollbar{width:8px}.log::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2);border-radius:8px}
  .row{display:flex;gap:11px;align-items:flex-end;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .row.me{flex-direction:row-reverse}
  .bub{max-width:74%;padding:13px 16px;border-radius:20px;font-size:15px;line-height:1.55}
  .me .bub{background:var(--grad);color:#fff;border-bottom-right-radius:6px;box-shadow:0 8px 20px -10px rgba(124,92,255,.7)}
  .bot .bub{background:#fff;border:1px solid var(--line);border-bottom-left-radius:6px;box-shadow:var(--shadow-sm)}
  .miniava{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;font-weight:800;font-size:13px;color:#fff;flex:none;box-shadow:0 6px 14px -6px rgba(54,40,120,.5)}
  .fb{margin-top:9px;font-size:13.5px;background:var(--okbg);border:1px solid rgba(16,185,129,.22);color:#0f7a5a;padding:9px 13px;border-radius:13px;line-height:1.5}
  .fb.tip{background:var(--warnbg);border-color:rgba(217,119,6,.22);color:var(--warn)}
  .blocked .bub{background:#fdeef1;border:1px solid rgba(225,29,72,.25);color:#9f1239}
  audio{height:36px;margin-top:9px;width:248px;max-width:100%}
  .starters{display:flex;gap:9px;flex-wrap:wrap;margin:12px 0}
  .starter{background:#fff;border:1px solid var(--line);color:var(--ink);padding:9px 14px;border-radius:999px;font-size:13.5px;cursor:pointer;box-shadow:var(--shadow-sm);transition:.15s}
  .starter:hover{border-color:var(--acc);color:var(--acc);transform:translateY(-1px)}
  .composer{display:flex;gap:11px;padding:14px;margin-top:12px;border-radius:18px;align-items:center;
    background:var(--glass);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.65);box-shadow:var(--shadow-sm)}
  .mic{width:48px;height:48px;flex:none;background:#fff;color:var(--acc);border:1.5px solid var(--line);border-radius:14px;font-size:18px;display:grid;place-items:center;box-shadow:var(--shadow-sm)}
  .mic:hover{border-color:var(--acc);transform:translateY(-1px)}
  .mic.on{background:var(--bad);color:#fff;border-color:var(--bad);animation:pulse 1.1s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(225,29,72,.45)}70%{box-shadow:0 0 0 12px rgba(225,29,72,0)}100%{box-shadow:0 0 0 0 rgba(225,29,72,0)}}
  .rechint{font-size:13px;color:var(--bad);font-weight:600;margin-top:10px;display:flex;align-items:center;gap:6px}
  .eng{font-size:11.5px;color:var(--acc);font-weight:600;margin-top:6px}
  .eng.warn{color:var(--warn)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;word-break:break-all;
    background:rgba(99,102,241,.06);border:1px solid var(--line);border-radius:10px;padding:9px 11px;color:var(--ink)}
  .steps a{color:var(--acc)} .steps code{background:rgba(99,102,241,.08);padding:1px 6px;border-radius:6px}
  .spk{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:12.5px;font-weight:600;
    background:rgba(99,102,241,.08);color:var(--acc);border:1px solid rgba(99,102,241,.18);
    padding:5px 11px;border-radius:999px}
  .spk:hover{background:rgba(99,102,241,.16)}
  .ck{display:flex;gap:11px;align-items:flex-start;font-size:13.5px;margin:9px 0;cursor:pointer;line-height:1.5}
  .ck input{margin-top:3px;width:17px;height:17px;accent-color:var(--acc)}
  .err{color:var(--bad);font-size:13.5px;margin-top:10px;background:#fdeef1;border:1px solid rgba(225,29,72,.2);padding:9px 13px;border-radius:12px}
  .center{min-height:100vh;display:grid;place-items:center;padding:24px}
  .hero{max-width:540px;text-align:center}
  .badge{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--acc);background:rgba(99,102,241,.1);padding:7px 14px;border-radius:999px;margin-bottom:20px}
  .hero h1{font-size:42px;margin:0 0 14px;line-height:1.15;letter-spacing:-1px;font-weight:800}
  .grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hero p{color:var(--mut);font-size:16.5px;margin:0 0 26px;line-height:1.6}
  .toggle{display:inline-flex;gap:8px;align-items:center;cursor:pointer}
  .toggle input{accent-color:var(--acc)}
  .label{font-size:13px;color:var(--mut);margin-bottom:7px;font-weight:600}
  .sec{font-weight:800;font-size:15px;margin:6px 0 12px;display:flex;align-items:center;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--grad)}
</style>
</head>
<body>
<div class="blobs"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
const API = localStorage.getItem("efu_api") || (typeof window!=="undefined" && window.EFU_API) || (location.protocol.indexOf("http")===0 ? location.origin : "http://localhost:8000");
const GRADS=[
  "linear-gradient(135deg,#6366f1,#8b5cf6)","linear-gradient(135deg,#ec4899,#f97316)",
  "linear-gradient(135deg,#10b981,#06b6d4)","linear-gradient(135deg,#8b5cf6,#ec4899)",
  "linear-gradient(135deg,#f59e0b,#ef4444)","linear-gradient(135deg,#06b6d4,#3b82f6)",
];
const gradFor=(s)=>GRADS[(s||"").split("").reduce((a,c)=>a+c.charCodeAt(0),0)%GRADS.length];
const initials=(n)=>(n||"?").trim().slice(0,2).toUpperCase();
const won=c=>c===0?"무료":"$"+(c/100).toFixed(2);

// ---- 현대적 2D 아바타 (목소리 튜터: 헤드폰 모티브, 시드 기반 다양성) ----
const hash=s=>(s||"").split("").reduce((a,c)=>(a*31+c.charCodeAt(0))>>>0,7);
const SKIN=["#f5d0b0","#ecc19c","#d39e7c","#b87e57","#8d5a3c"];
const HAIR=["#2b2230","#5a3a22","#3b2a1a","#8a5a2b","#1c1c28","#a86b3c","#d9b38c"];
const GP=[["#818cf8","#c084fc"],["#f472b6","#fb923c"],["#34d399","#22d3ee"],["#a78bfa","#f472b6"],["#fbbf24","#fb7185"],["#22d3ee","#60a5fa"]];
function Avatar({seed,size=96,radius=22}){
  const h=hash(seed), skin=SKIN[h%SKIN.length], hair=HAIR[(h>>3)%HAIR.length];
  const style=(h>>5)%3, g=GP[(h>>2)%GP.length], id="g"+(h%99999);
  return (
   <svg viewBox="0 0 100 100" width={size} height={size} style={{display:"block",borderRadius:radius,flex:"none"}} aria-hidden="true">
     <defs><linearGradient id={id} x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor={g[0]}/><stop offset="1" stopColor={g[1]}/></linearGradient></defs>
     <rect width="100" height="100" rx={radius} fill={`url(#${id})`}/>
     {style===1 && <ellipse cx="50" cy="56" rx="29" ry="29" fill={hair}/>}
     <rect x="43" y="64" width="14" height="16" rx="7" fill={skin}/>
     <circle cx="50" cy="49" r="23" fill={skin}/>
     {style===0 && <path d="M27 47 C27 30 73 30 73 47 C73 39 60 31 50 31 C40 31 27 39 27 47 Z" fill={hair}/>}
     {style===1 && <path d="M27 49 C25 28 75 28 73 49 L73 43 C69 34 58 31 50 31 C42 31 31 34 27 43 Z" fill={hair}/>}
     {style===2 && <path d="M29 45 C29 32 71 32 71 45 C65 39 60 37 50 37 C40 37 35 39 29 45 Z" fill={hair}/>}
     <circle cx="42" cy="49" r="2.6" fill="#23233a"/><circle cx="58" cy="49" r="2.6" fill="#23233a"/>
     <path d="M43 57 Q50 63 57 57" stroke="#23233a" strokeWidth="2.4" fill="none" strokeLinecap="round"/>
     <path d="M24 54 Q50 14 76 54" stroke="#222431" strokeWidth="4.5" fill="none" strokeLinecap="round"/>
     <rect x="19" y="50" width="10" height="17" rx="5" fill="#222431"/>
     <rect x="71" y="50" width="10" height="17" rx="5" fill="#222431"/>
   </svg>
  );
}

async function api(path, opts={}){
  const r = await fetch(API+path, {headers:{"Content-Type":"application/json"}, ...opts});
  if(!r.ok){ let d; try{d=await r.json()}catch{d={}}; const e=new Error(d.detail||("HTTP "+r.status)); e.code=r.status; throw e; }
  return r.status===204?null:r.json();
}

// 브라우저 내장 음성합성으로 튜터 답변을 실제 영어 음성으로 읽기 (무료·설치 불필요)
function pickEnVoice(accent){
  const vs=(window.speechSynthesis&&speechSynthesis.getVoices())||[];
  const want=accent==="British"?"en-GB":accent==="Australian"?"en-AU":"en-US";
  return vs.find(v=>v.lang===want && /google|natural|premium|samantha|daniel|karen|aria/i.test(v.name))
      || vs.find(v=>v.lang===want)
      || vs.find(v=>v.lang&&v.lang.toLowerCase().startsWith("en")) || null;
}
// ---- 블록체인 / 코인 발행 (지갑 서명은 사용자 지갑에서만; 앱은 키를 절대 보관하지 않음) ----
const isAddr=a=>/^0x[0-9a-fA-F]{40}$/.test(a||"");
const isTx=t=>/^0x[0-9a-fA-F]{64}$/.test(t||"");
const REGISTRY_ABI=[
  "function registerVoice(bytes32 consentHash, string accent, uint256 licenseFee, uint256 usagePrice, uint16 royaltyBps) returns (uint256)",
  "event VoiceRegistered(uint256 indexed id, address indexed creator, bytes32 consentHash, string accent)"
];
function hasWallet(){ return typeof window!=="undefined" && window.ethereum; }
async function connectWallet(){
  if(!hasWallet()) throw new Error("브라우저 지갑(MetaMask 등)이 없습니다.");
  const a=await window.ethereum.request({method:"eth_requestAccounts"});
  return a[0];
}
async function mintVoiceOnChain(cfg, voice){
  if(typeof ethers==="undefined") throw new Error("ethers 로드 실패(네트워크 확인).");
  if(!hasWallet()) throw new Error("지갑(MetaMask)이 필요합니다.");
  if(!isAddr(cfg.registry_address)) throw new Error("Registry 컨트랙트 주소가 설정되지 않았습니다. (계정→블록체인)");
  if(!voice.consent_hash) throw new Error("동의 해시가 없습니다.");
  const provider=new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts",[]);
  const signer=await provider.getSigner();
  const wallet=await signer.getAddress();
  const c=new ethers.Contract(cfg.registry_address, REGISTRY_ABI, signer);
  // 데모: 가격 0으로 발행(등록 후 가격/로열티는 컨트랙트에서 조정). royalty 80%.
  const tx=await c.registerVoice(voice.consent_hash, voice.accent||"American", 0n, 0n, 8000);
  const rc=await tx.wait();
  let tokenId=null;
  for(const lg of rc.logs){ try{ const p=c.interface.parseLog(lg); if(p&&p.name==="VoiceRegistered"){ tokenId=p.args[0].toString(); break; } }catch(_){ } }
  return { tx_hash: rc.hash, token_id: tokenId, wallet, chain_id: cfg.chain_id };
}

function speakText(text,accent,queue){
  if(!window.speechSynthesis||!text) return;
  try{ if(!queue) speechSynthesis.cancel();   // queue=true면 앞 발화 뒤에 이어서 재생
    const u=new SpeechSynthesisUtterance(text);
    const v=pickEnVoice(accent); if(v){ u.voice=v; u.lang=v.lang; } else u.lang="en-US";
    u.rate=0.97; u.pitch=1.0;
    speechSynthesis.speak(u);
  }catch(_){}
}

function App(){
  const [user,setUser]=useState(JSON.parse(localStorage.getItem("efu_user")||"null"));
  const [tab,setTab]=useState("tutors");
  const [voice,setVoice]=useState(null);
  // 서버 재시작 등으로 저장된 계정이 사라졌으면 같은 정보로 자동 재등록(‘user not found’ 방지)
  useEffect(()=>{ if(!user) return;
    api(`/users/${user.id}`).catch(async()=>{
      try{ const u=await api("/users",{method:"POST",body:JSON.stringify(
            {email:user.email,native_language:user.native_language,level:user.level})});
        localStorage.setItem("efu_user",JSON.stringify(u)); setUser(u);
      }catch(_){}
    });
  },[]);
  if(!user) return <Landing onDone={u=>{localStorage.setItem("efu_user",JSON.stringify(u));setUser(u);}}/>;
  const logout=()=>{localStorage.removeItem("efu_user");setUser(null);setVoice(null);};
  const nav=[["practice","💬","회화 연습"],["tutors","🎧","튜터(목소리)"],["register","🎙","목소리 등록"],["account","⚙️","계정"]];
  return (
   <div className="app">
     <div className="side">
       <div className="brand"><div className="logo">🗣️</div><div>English For Us<small>원어민 목소리로 영어 회화</small></div></div>
       {nav.map(([k,ic,t])=><div key={k} className={"nav"+(tab===k?" on":"")} onClick={()=>setTab(k)}><span className="ic">{ic}</span>{t}</div>)}
       <div style={{flex:1}}/>
       <div className="nav" onClick={logout}><span className="ic">↩︎</span>로그아웃</div>
     </div>
     <div className="main">
       {tab==="practice" && <Practice user={user} voice={voice} setVoice={setVoice} goTutors={()=>setTab("tutors")}/>}
       {tab==="tutors" && <Tutors user={user} onPick={(v)=>{setVoice(v);setTab("practice");}}/>}
       {tab==="register" && <Register user={user} onDone={()=>setTab("tutors")}/>}
       {tab==="account" && <Account user={user}/>}
     </div>
   </div>
  );
}

function Landing({onDone}){

const STARTERS=[
  "Hi! How are you doing today?","I want to talk about my weekend.",
  "Can we talk about food?","Tell me about your job.","Let's talk about travel.",
];

function Practice({user,voice,setVoice,goTutors}){
  const [log,setLog]=useState([]); const [text,setText]=useState(""); const [err,setErr]=useState("");
  const [auto,setAuto]=useState(true); const [busy,setBusy]=useState(false); const [rec,setRec]=useState(false);
  const [mic,setMic]=useState(null);  // {airpods, label, gain}
  const [ai,setAi]=useState({use_ai:false,provider:"anthropic",model:"",has_key:false,base_url:""});
  const [myVoices,setMyVoices]=useState([]); const [voice2,setVoice2]=useState(null);
  const endRef=useRef(null); const mrRef=useRef(null); const chunksRef=useRef([]);
  const streamRef=useRef(null); const ctxRef=useRef(null);
  const recogRef=useRef(null); const transcriptRef=useRef("");
  useEffect(()=>{api(`/catalog/my-voices?user_id=${user.id}`).then(vs=>{setMyVoices(vs); if(!voice&&vs[0])setVoice(vs[0]);}).catch(()=>{});},[]);
  useEffect(()=>{api("/settings").then(setAi).catch(()=>{});},[]);
  useEffect(()=>{ if(window.speechSynthesis){ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>{}; } },[]);
  useEffect(()=>{endRef.current&&endRef.current.scrollIntoView({behavior:"smooth"});},[log,busy]);
  const toggleAi=async()=>{ setErr("");
    if(!ai.use_ai){ // 켤 때 사전 점검
      const needsKey=ai.provider==="anthropic"||ai.provider==="openai";
      if(needsKey && !ai.has_key){ setErr("‘계정’ 탭에서 API 키를 먼저 입력하세요."); return; }
      if(ai.provider==="openai_compat" && !ai.base_url){ setErr("‘계정’ 탭에서 로컬/호환 서버 주소(Base URL)를 입력하세요."); return; }
    }
    try{ const s=await api("/settings",{method:"POST",body:JSON.stringify({use_ai:!ai.use_ai})}); setAi(s); }
    catch(e){ setErr(e.message); }
  };
  const send=async(t0,myAudio)=>{ const t=(t0??text).trim(); if(!t||busy)return; setText(""); setErr(""); setBusy(true);
    const history=log.filter(m=>!m.blocked).map(m=>m.role==="user"?{role:"user",text:m.text}:{role:"assistant",text:m.reply_text}).filter(m=>m.text);
    setLog(l=>[...l,{role:"user",text:t,audio:myAudio||null}]);
    const group = voice && voice2 && voice2.id!==voice.id;   // 3자 대화 모드
    try{
      if(group){
        const r=await api("/chat/group",{method:"POST",body:JSON.stringify({user_id:user.id,voice_ids:[voice.id,voice2.id],text:t,history})});
        if(r.blocked){ setLog(l=>[...l,{role:"bot",blocked:true,block_reason:r.block_reason}]); }
        else{
          (r.replies||[]).forEach((rep,idx)=>{
            setLog(l=>[...l,{role:"bot",reply_text:rep.reply_text,audio_url:rep.audio_url,engine:rep.engine,
              voiceId:rep.voice_id,voiceName:rep.name,accent:rep.accent,feedback:idx===0?r.feedback:null}]);
            if(auto && rep.reply_text) speakText(rep.reply_text, rep.accent, idx>0);
          });
        }
      } else {
        const r=await api("/chat",{method:"POST",body:JSON.stringify({user_id:user.id,voice_id:voice?voice.id:null,text:t,history})});
        setLog(l=>[...l,{role:"bot",...r}]);
        if(auto && !r.blocked && r.reply_text){ speakText(r.reply_text, voice?voice.accent:"American"); }
      }
    }catch(e){ setErr(e.code===402?"이 튜터는 구매 후 사용할 수 있어요. ‘튜터(목소리)’ 탭에서 선택하세요.":e.message); }
    setBusy(false);
  };
  const blobToB64=(b)=>new Promise(res=>{const fr=new FileReader();fr.onload=()=>res((fr.result+"").split(",")[1]||"");fr.readAsDataURL(b);});
  const detectAirpods=(stream)=>{
    const t=stream.getAudioTracks()[0];
    const label=(t&&t.label)||"";
    return {airpods:/airpods|에어팟/i.test(label), label};
  };
  const startRec=async()=>{ setErr("");
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;  // 브라우저 내장 음성인식
    try{
      // 향상된 입력 제약: 자동게인·노이즈억제·에코제거
      let stream;
      try{ stream=await navigator.mediaDevices.getUserMedia({audio:{
        echoCancellation:true, noiseSuppression:true, autoGainControl:true, channelCount:1 }}); }
      catch(_){ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
      streamRef.current=stream;

      const det=detectAirpods(stream);
      const gain=det.airpods?1.8:1.15;   // AirPods(블루투스 마이크)는 더 높게
      setMic({...det, gain});

      // Web Audio 체인으로 입력 증폭 후 녹음 → 재생/감도용
      let recStream=stream;
      try{
        const Ctx=window.AudioContext||window.webkitAudioContext;
        const ctx=new Ctx(); ctxRef.current=ctx;
        if(ctx.state==="suspended") await ctx.resume();
        const srcNode=ctx.createMediaStreamSource(stream);
        const g=ctx.createGain(); g.gain.value=gain;
        const comp=ctx.createDynamicsCompressor();
        comp.threshold.value=-45; comp.ratio.value=4; comp.attack.value=0.003; comp.release.value=0.25;
        const dest=ctx.createMediaStreamDestination();
        srcNode.connect(comp); comp.connect(g); g.connect(dest);
        recStream=dest.stream;
      }catch(_){ }

      const mr=new MediaRecorder(recStream); chunksRef.current=[];
      mr.ondataavailable=e=>{ if(e.data.size) chunksRef.current.push(e.data); };
      mr.onstop=async()=>{
        if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
        if(ctxRef.current){ try{ctxRef.current.close();}catch(_){} ctxRef.current=null; }
        const blob=new Blob(chunksRef.current,{type:mr.mimeType||"audio/webm"});
        const myAudio=URL.createObjectURL(blob);           // 내 목소리 로컬 재생용
        let said=(transcriptRef.current||"").trim();
        if(!said){
          if(SR){ setText(""); setErr("음성을 알아듣지 못했어요. 마이크에 가까이서 또박또박 말해보세요."); return; }
          // 음성인식 미지원 브라우저 → 서버 STT 폴백
          setBusy(true);
          try{ const b64=await blobToB64(blob);
            const r=await api("/chat/transcribe",{method:"POST",body:JSON.stringify({audio_b64:b64})});
            said=r.text;
          }catch(e){ setBusy(false); setErr("음성 인식 실패: "+e.message); return; }
          setBusy(false);
        }
        await send(said, myAudio);    // 실제 인식된 내 말 + 내 음성
      };
      mr.start(); mrRef.current=mr;

      // 실제 음성 인식 시작 (영어)
      transcriptRef.current="";
      if(SR){
        const recog=new SR();
        recog.lang="en-US"; recog.interimResults=true; recog.continuous=true;
        recog.onresult=(e)=>{ let fin="",interim="";
          for(let i=0;i<e.results.length;i++){ const r=e.results[i];
            if(r.isFinal) fin+=r[0].transcript; else interim+=r[0].transcript; }
          transcriptRef.current=(fin+" "+interim).trim();   // 최종+잠정 모두 보존
          setText(transcriptRef.current);                   // 실시간 캡션
        };
        recog.onend=()=>{ if(mrRef.current && mrRef.current.state!=="inactive") mrRef.current.stop(); };
        recog.onerror=(e)=>{ if(e&&e.error==="not-allowed") setErr("마이크 권한이 필요합니다."); };
        recogRef.current=recog;
        try{ recog.start(); }catch(_){ }
      }
      setRec(true);
    }catch(e){ setErr("마이크를 사용할 수 없어요. 브라우저에서 마이크 접근을 허용해 주세요."); }
  };
  const stopRec=()=>{ if(!rec) return; setRec(false);
    if(recogRef.current){ try{recogRef.current.stop();}catch(_){} recogRef.current=null; }  // onend가 녹음 정지→전송
    else if(mrRef.current && mrRef.current.state!=="inactive"){ mrRef.current.stop(); }
  };
  const toggleRec=()=>rec?stopRec():startRec();
  return <div className="room">
    <div className="roomhead">
      {voice ? <>
        <Avatar seed={voice.id} size={46} radius={14}/>
        <div style={{flex:1}}><b style={{fontSize:16}}>{voice.display_name}</b> <span className="pill">{voice.accent}</span>
          <div className="mut" style={{fontSize:12.5,marginTop:2}}>원어민 회화 파트너 · {user.native_language==="ja"?"日本語":"한국어"} 교정</div></div>
      </> : <>
        <div className="ava" style={{width:46,height:46,fontSize:20,background:"linear-gradient(135deg,#cbd5e1,#94a3b8)"}}>🎧</div>
        <div style={{flex:1}}><b style={{fontSize:16}}>튜터를 선택하세요</b><div className="mut" style={{fontSize:12.5}}>목소리 없이 텍스트로도 대화할 수 있어요</div></div>
        <button className="btn sm" onClick={goTutors}>튜터 고르기</button>
      </>}
      {myVoices.length>1 && <span className="toggle pill" title="3자 대화 — 두 번째 튜터 추가">👥
        <select value={voice2?voice2.id:""} onChange={e=>setVoice2(myVoices.find(v=>v.id===e.target.value)||null)}
          style={{border:"none",background:"transparent",font:"inherit",color:"inherit",cursor:"pointer",outline:"none",padding:0}}>
          <option value="">1:1</option>
          {myVoices.filter(v=>!voice||v.id!==voice.id).map(v=><option key={v.id} value={v.id}>+{v.display_name}</option>)}
        </select></span>}
      {mic && <span className="pill" style={mic.airpods?{color:"var(--acc)",background:"rgba(99,102,241,.1)",borderColor:"rgba(99,102,241,.25)"}:{}} title={mic.label||""}>{mic.airpods?`🎧 AirPods 감지 · 감도 ${mic.gain}×`:`🎙 감도 ${mic.gain}×`}</span>}
      <span className="toggle pill" onClick={toggleAi} style={{cursor:"pointer",...(ai.use_ai?{color:"var(--acc)",background:"rgba(99,102,241,.12)",borderColor:"rgba(99,102,241,.3)"}:{})}} title="AI 답변 켜기/끄기 (계정 탭에서 제공자·키 설정)">
        <span style={{width:9,height:9,borderRadius:"50%",background:ai.use_ai?"var(--ok)":"var(--soft)",display:"inline-block"}}/> 🤖 AI {ai.use_ai?"ON":"OFF"}</span>
      <label className="toggle pill"><input type="checkbox" checked={auto} onChange={e=>setAuto(e.target.checked)}/> 자동 재생</label>
    </div>
    <div className="log">
      {log.length===0 && <div style={{margin:"auto 0",textAlign:"center"}}>
        <div style={{fontSize:46,marginBottom:8}}>👋</div>
        <div style={{fontWeight:700,fontSize:18}}>대화를 시작해 볼까요?</div>
        <div className="mut" style={{fontSize:14,margin:"6px 0 4px"}}>아래 문장을 눌러 바로 시작할 수 있어요</div>
        <div className="starters" style={{justifyContent:"center"}}>{STARTERS.map((s,i)=><div key={i} className="starter" onClick={()=>send(s)}>{s}</div>)}</div>
      </div>}
      {log.map((m,i)=> m.role==="user"
        ? <div className="row me" key={i}><div style={{maxWidth:"74%"}}><div className="bub">{m.text}</div>{m.audio && <audio controls src={m.audio} style={{marginTop:8,width:"100%"}}/>}</div></div>
        : <div className={"row bot"+(m.blocked?" blocked":"")} key={i}>
            {(m.voiceId||voice)?<Avatar seed={m.voiceId||(voice&&voice.id)} size={34} radius={11}/>:<div className="miniava" style={{background:"linear-gradient(135deg,#94a3b8,#64748b)"}}>AI</div>}
            <div>
              {m.voiceName && <div className="mut" style={{fontSize:11.5,fontWeight:600,margin:"0 0 3px 2px"}}>{m.voiceName}</div>}
              <div className="bub">{m.blocked?("⚠️ "+m.block_reason):m.reply_text}
                {!m.blocked && m.reply_text && <button className="spk" onClick={()=>speakText(m.reply_text, m.accent||(voice&&voice.accent)||"American")} title="다시 듣기">🔊 듣기</button>}</div>
              {m.feedback && <div className={"fb"+(/(팁|ヒント|tip)/i.test(m.feedback)?" tip":"")}>{m.feedback}</div>}
              {m.engine && m.engine!=="mock" && m.engine.indexOf("실패")<0 && <div className="eng">✨ {m.engine}</div>}
              {m.engine && m.engine.indexOf("실패")>=0 && <div className="eng warn" title={m.engine}>⚠ AI 호출 실패 — 데모 답변</div>}
            </div>
          </div>)}
      {busy && <div className="row bot"><div className="miniava" style={{background:voice?gradFor(voice.id):"linear-gradient(135deg,#94a3b8,#64748b)"}}>{voice?initials(voice.display_name):"AI"}</div><div className="bub mut">…</div></div>}
      <div ref={endRef}/>
    </div>
    {err && <div className="err">{err}</div>}
    {rec && <div className="rechint">● 녹음 중{mic&&mic.airpods?" · AirPods 입력 감도 향상 적용됨":""}… 다 말한 뒤 ■ 버튼을 누르면 자동으로 인식·전송돼요</div>}
    <div className="composer">
      <button className={"mic"+(rec?" on":"")} onClick={toggleRec} disabled={busy} title="음성으로 말하기" aria-label="음성 입력">{rec?"■":"🎙"}</button>
      <input className="field" placeholder={rec?"듣고 있어요…":"영어로 말하거나 입력해 보세요…"} value={text} disabled={rec}
        onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}/>
      <button className="btn" disabled={busy||rec||!text.trim()} onClick={()=>send()}>{busy?"…":"전송"}</button>
    </div>
  </div>;
}

function Tutors({user,onPick}){
  const [list,setList]=useState([]); const [err,setErr]=useState(""); const [busy,setBusy]=useState("");
  const load=async()=>{ try{
    const mine=await api(`/catalog/my-voices?user_id=${user.id}`);
    const store=await api(`/catalog/voices?user_id=${user.id}`);
    const ownedIds=new Set(mine.map(v=>v.id));
    // 내 튜터 먼저, 그다음 스토어
    const merged=[...mine.map(v=>({...v,owned:true})), ...store.filter(v=>!ownedIds.has(v.id)).map(v=>({...v,owned:false}))];
    setList(merged);
  }catch(e){setErr(e.message.includes("fetch")?"백엔드(localhost:8000)에 연결할 수 없습니다. server.py가 실행 중인지 확인하세요.":e.message);} };
  useEffect(()=>{load()},[]);
  const start=async(v)=>{
    if(v.owned){ onPick(v); return; }
    setBusy(v.id); setErr("");
    try{
      const o=await api(`/catalog/voices/${v.id}/purchase`,{method:"POST",body:JSON.stringify({user_id:user.id})});
      await api(`/catalog/orders/${o.order_id}/confirm?payment_token=${o.payment_token}`,{method:"POST"});
      onPick({...v,owned:true});
    }catch(e){ setErr(/user not found/i.test(e.message)?"계정을 동기화하는 중이에요. 잠시 후 다시 눌러주세요. (서버를 새로 켰다면 페이지를 새로고침하세요)":e.message); }
    setBusy("");
  };
  const Card=({v})=>(
    <div className="tutorcard" onClick={()=>start(v)}>
      <Avatar seed={v.id} size={104} radius={20}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <b style={{fontSize:17}}>{v.display_name}</b>
          {v.owned && <span className="pill" style={{color:"var(--ok)",background:"var(--okbg)",borderColor:"rgba(16,185,129,.2)"}}>보유중</span>}
        </div>
        <div style={{display:"flex",gap:6,margin:"6px 0"}}><span className="pill">{v.accent}</span><span className="pill">{v.gender}</span></div>
        <div className="mut" style={{fontSize:13,lineHeight:1.5}}>{v.description||"원어민 회화 파트너"}</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:12}}>
          <span className="price">{v.owned?"":won(v.price_cents)}</span>
          <button className="btn sm" disabled={busy===v.id} onClick={(e)=>{e.stopPropagation();start(v);}}>
            {busy===v.id?"처리중…":(v.owned?"대화 시작 →":(v.price_cents===0?"무료로 시작 →":"구매 후 시작 →"))}
          </button>
        </div>
      </div>
    </div>
  );
  return <div>
    <h2 className="h">튜터를 <span className="grad-text">선택</span>하세요</h2>
    <p className="hsub">대화하고 싶은 원어민 목소리를 골라보세요. 카드를 누르면 바로 회화가 시작됩니다.</p>
    {err && <div className="err">{err}</div>}
    {list.length===0 && !err && <div className="card mut">튜터를 불러오는 중…</div>}
    <div className="tgrid">{list.map(v=><Card key={v.id} v={v}/>)}</div>
    <div className="card" style={{marginTop:18,display:"flex",alignItems:"center",gap:14}}>
      <div style={{flex:1}}><b>내 목소리도 튜터로 만들 수 있어요</b>
        <div className="mut" style={{fontSize:13,marginTop:3}}>좋아하는 원어민의 1~5분 음성을 등록하면 그 목소리로 대화할 수 있습니다.</div></div>
    </div>
  </div>;
}

function BlockchainPanel({voice, cfg}){

  return (
    <div className="card" style={{marginTop:14}}>
      <div className="sec"><span className="dot"/>🪙 코인 발행 · 블록체인 프로비넌스</div>
      <div className="mut" style={{fontSize:13,lineHeight:1.6,marginBottom:10}}>
        이 목소리의 <b>동의 기록 해시</b>를 온체인에 기록해 소유권·동의를 위변조 없이 증명하고 소유권 NFT를 발행합니다. <b>음성 원본은 절대 체인에 올리지 않습니다.</b>
      </div>
      <div className="label">동의 해시 (provenance)</div>
      <div className="mono">{voice.consent_hash||"—"}</div>
      {res ? (
        <div className="ok" style={{marginTop:12,fontSize:13.5,fontWeight:600}}>
          ✅ 발행 완료 · 토큰 #{res.token_id!=null?res.token_id:"?"}<br/>
          <a className="steps" href={`${explorer}/tx/${res.tx_hash}`} target="_blank" rel="noreferrer">트랜잭션 보기 ↗</a>
        </div>
      ) : configured ? (
        <div style={{marginTop:12}}>
          {!hasWallet() && <div className="mut" style={{fontSize:13,marginBottom:8}}>지갑(MetaMask)이 감지되지 않았어요. 설치 후 새로고침하세요.</div>}
          <div className="row" style={{gap:10}}>
            <button className="btn sm outline" onClick={connect} disabled={!hasWallet()}>{wallet?("지갑 "+wallet.slice(0,6)+"…"+wallet.slice(-4)):"지갑 연결"}</button>
            <button className="btn sm" onClick={mint} disabled={busy||!hasWallet()}>{busy?"발행 중…":"온체인 코인 발행"}</button>
          </div>
        </div>
      ) : (
        <div className="steps">
          <div className="mut" style={{fontSize:13,margin:"10px 0 6px"}}>아직 블록체인이 연결되지 않았어요. 다음을 따라 설정하면 발행할 수 있어요:</div>
          <ol style={{margin:0,paddingLeft:18,fontSize:13,lineHeight:1.8}}>
            <li><a href="https://metamask.io/" target="_blank" rel="noreferrer">MetaMask</a> 설치 후 테스트넷(Sepolia) 선택</li>
            <li><a href="https://sepoliafaucet.com/" target="_blank" rel="noreferrer">테스트넷 ETH</a>(가스비) 받기</li>
            <li><code>blockchain/</code> 폴더에서 컨트랙트 배포 → 주소 확보</li>
            <li><b>계정 → 블록체인 설정</b>에 컨트랙트 주소 입력 후 다시 발행</li>
          </ol>
        </div>
      )}
      {err && <div className="err">{err}</div>}
    </div>
  );
}

function Register({user,onDone}){
  const [name,setName]=useState(""); const [file,setFile]=useState(null);
  const [ck,setCk]=useState({}); const [err,setErr]=useState(""); const [created,setCreated]=useState(null); const [cfg,setCfg]=useState(null);
  const [pub,setPub]=useState(true); const [price,setPrice]=useState(0); const [accent,setAccent]=useState("American");
  useEffect(()=>{api("/settings").then(setCfg).catch(()=>{});},[]);
  const all=CONSENT.every(([k])=>ck[k]);
  const readB64=(f)=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res((r.result+"").split(",")[1]||"");r.onerror=rej;r.readAsDataURL(f);});
  const submit=async()=>{ setErr(""); try{
    const audio_b64=file?await readB64(file):"";
    const v=await api("/voices",{method:"POST",body:JSON.stringify({user_id:user.id,display_name:name,consent:CONSENT.reduce((o,[k])=>(o[k]=!!ck[k],o),{}),audio_b64,filename:file?file.name:""})});
    if(pub){ try{ await api(`/catalog/voices/${v.id}/publish`,{method:"POST",body:JSON.stringify({price_cents:Number(price),accent,gender:"unspecified",description:name+" — 원어민 회화 파트너"})}); }catch(_){} v.accent=accent; }
    setCreated(v);
  }catch(e){setErr(e.message);} };
  if(created) return <div><h2 className="h">등록 완료 🎉</h2>
    <div className="card"><b>{created.display_name}</b> 튜터가 등록되었어요{pub?" · 스토어에 공개됨":""}.
      <div style={{marginTop:14}}><button className="btn sm" onClick={onDone}>튜터 목록으로 →</button></div></div>
    <BlockchainPanel voice={created} cfg={cfg}/>
  </div>;
  return <div><h2 className="h">원어민 <span className="grad-text">목소리 등록</span></h2>
    <p className="hsub">영어 원어민의 1~5분 음성을 올리면 그 목소리로 회화 튜터를 만들 수 있어요. <b>동의 절차는 필수</b>입니다.</p>
    <div className="card">
      <div className="label">튜터 이름</div>
      <input className="field" placeholder="예: Emma — US English" value={name} onChange={e=>setName(e.target.value)}/>
      <div className="label" style={{marginTop:14}}>음성 파일 (mp3/wav, 1~5분)</div>
      <input className="field" type="file" accept="audio/*" onChange={e=>setFile(e.target.files[0])}/>
      <div className="sec" style={{marginTop:18}}><span className="dot"/>동의 (모두 필수)</div>
      {CONSENT.map(([k,t])=><label className="ck" key={k}><input type="checkbox" checked={!!ck[k]} onChange={e=>setCk({...ck,[k]:e.target.checked})}/>{t}</label>)}
      <label className="ck" style={{marginTop:12}}><input type="checkbox" checked={pub} onChange={e=>setPub(e.target.checked)}/>스토어에 공개(다른 학습자도 사용)</label>
      {pub && <div className="grid g2" style={{marginTop:8}}>
        <div><div className="label">가격(센트, 0=무료)</div><input className="field" type="number" min="0" value={price} onChange={e=>setPrice(e.target.value)}/></div>
        <div><div className="label">억양 / 지역</div><select className="field" value={accent} onChange={e=>setAccent(e.target.value)}>
          <option>American</option><option>Texan / Southern</option><option>New York</option>
          <option>Californian (LA)</option><option>British</option><option>Australian</option></select></div>
      </div>}
      <button className="btn" style={{marginTop:18}} disabled={!all||!name||!file} onClick={submit}>등록하기</button>
      {!all && <span className="mut" style={{marginLeft:12,fontSize:13}}>필수 동의에 모두 체크해야 등록됩니다</span>}
      {err && <div className="err">{err}</div>}
    </div></div>;
}

function Account({user}){
  const [mine,setMine]=useState([]); const [msg,setMsg]=useState("");
  const [st,setSt]=useState({use_ai:false,provider:"anthropic",model:"",base_url:"",has_key:false});
  const [key,setKey]=useState(""); const [smsg,setSmsg]=useState("");
  const load=()=>api(`/catalog/my-voices?user_id=${user.id}`).then(setMine).catch(()=>{});
  useEffect(()=>{load(); api("/settings").then(setSt).catch(()=>{});},[]);
  const del=async(v)=>{ if(!confirm(`${v.display_name} 목소리를 완전 삭제할까요? (원본·지문·생성물 제거)`))return;
    try{ await api(`/voices/${v.id}`,{method:"DELETE"}); setMsg(`${v.display_name} 삭제됨`); load(); }catch(e){setMsg(e.message);} };
  const patch=async(body)=>{ setSmsg(""); try{ const s=await api("/settings",{method:"POST",body:JSON.stringify(body)}); setSt(s); return s; }catch(e){setSmsg(e.message);} };
  const PROVIDERS=[["mock","데모 (무료·키 불필요)"],["anthropic","Anthropic Claude"],["openai","OpenAI (ChatGPT)"],["openai_compat","OpenAI 호환 / 로컬 (Ollama 등)"]];
  const DEFMODEL={anthropic:"claude-sonnet-4-6",openai:"gpt-4o",openai_compat:"llama3.1",mock:""};
  const onProvider=async(p)=>{ await patch({provider:p, model:DEFMODEL[p]||st.model}); };
  const saveKey=async()=>{ const s=await patch({api_key:key}); if(s){ setSmsg("API 키가 저장되었습니다."); setKey(""); } };
  const toggle=async()=>{ if(!st.use_ai){
      const needsKey=st.provider==="anthropic"||st.provider==="openai";
      if(needsKey && !st.has_key){ setSmsg("먼저 API 키를 저장하세요."); return; }
      if(st.provider==="openai_compat" && !st.base_url){ setSmsg("먼저 Base URL을 입력하세요."); return; }
      if(st.provider==="mock"){ setSmsg("데모는 항상 동작합니다. 다른 제공자를 고르면 AI를 켤 수 있어요."); }
    }
    await patch({use_ai:!st.use_ai}); };
  const isCompat=st.provider==="openai_compat"; const isMock=st.provider==="mock";
  return <div><h2 className="h">계정 · 데이터</h2>
    <p className="hsub">{user.email} · {user.native_language==="ja"?"日本語":"한국어"} / {user.level}</p>
    <div className="card">
      <div className="sec"><span className="dot"/>AI 답변 엔진</div>
      <div className="mut" style={{fontSize:13.5,marginBottom:14,lineHeight:1.6}}>
        튜터의 답변을 어떤 AI로 생성할지 고릅니다. <b>로컬(Ollama 등)</b>은 키·비용 없이 내 컴퓨터에서 동작해요.<br/>
        <b>참고:</b> Claude·ChatGPT <u>구독 계정</u>은 직접 연결할 수 없고, 각 사의 <u>API 키</u>가 필요합니다(구독과 별도 과금). 키는 이 로컬 서버 메모리에만 저장됩니다.
      </div>
      <div className="label">제공자</div>
      <select className="field" value={st.provider} onChange={e=>onProvider(e.target.value)}>
        {PROVIDERS.map(([v,t])=><option key={v} value={v}>{t}</option>)}
      </select>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",margin:"14px 0"}}>
        <button className={"btn sm"+(st.use_ai?"":" outline")} onClick={toggle}>{st.use_ai?"AI 켜짐 ✓":"AI 꺼짐"}</button>
        <span className="pill" style={st.use_ai?{color:"var(--ok)",background:"var(--okbg)",borderColor:"rgba(16,185,129,.2)"}:{}}>{st.use_ai?"사용 중":"데모 모드"}</span>
        {!isMock && <span className="pill" style={st.has_key?{color:"var(--ok)",background:"var(--okbg)",borderColor:"rgba(16,185,129,.2)"}:{}}>{st.has_key?"키 등록됨":"키 없음"}</span>}
      </div>
      {!isMock && <>
        <div className="grid g2">
          <div><div className="label">모델</div>
            <input className="field" placeholder={DEFMODEL[st.provider]||"model"} value={st.model||""} onChange={e=>setSt({...st,model:e.target.value})} onBlur={e=>patch({model:e.target.value})}/></div>
          {isCompat && <div><div className="label">Base URL</div>
            <input className="field" placeholder="http://localhost:11434/v1" value={st.base_url||""} onChange={e=>setSt({...st,base_url:e.target.value})} onBlur={e=>patch({base_url:e.target.value})}/></div>}
        </div>
        <div className="label" style={{marginTop:12}}>API 키 {isCompat?"(로컬은 보통 불필요)":""}</div>
        <div style={{display:"flex",gap:10}}>
          <input className="field" type="password" placeholder={st.provider==="anthropic"?"sk-ant-...":"sk-..."} value={key} onChange={e=>setKey(e.target.value)}/>
          <button className="btn sm" disabled={!key} onClick={saveKey}>키 저장</button>
        </div>
      </>}
      {isCompat && <div className="mut" style={{fontSize:12.5,marginTop:10,lineHeight:1.6}}>
        예) Ollama: 터미널에서 <code>ollama run llama3.1</code> 실행 후 Base URL <code>http://localhost:11434/v1</code>, 모델 <code>llama3.1</code>. 키는 비워도 됩니다.
      </div>}
      {smsg && <div className="ok" style={{marginTop:10,fontSize:13,fontWeight:600}}>{smsg}</div>}
    </div>
    <div className="card">
      <div className="sec"><span className="dot"/>🔗 블록체인 설정 (코인 발행)</div>
      <div className="mut" style={{fontSize:13,marginBottom:12,lineHeight:1.6}}>
        코인 발행(소유권 NFT)에 쓸 네트워크·컨트랙트 주소를 입력합니다. <b>비밀키는 입력하지 않습니다</b> — 서명은 항상 본인 지갑(MetaMask)에서 이뤄집니다.
      </div>
      <div className="grid g2">
        <div><div className="label">체인 ID</div><input className="field" placeholder="11155111 (Sepolia)" value={st.chain_id||""} onChange={e=>setSt({...st,chain_id:e.target.value})} onBlur={e=>patch({chain_id:e.target.value})}/></div>
        <div><div className="label">Explorer Base</div><input className="field" placeholder="https://sepolia.etherscan.io" value={st.explorer_base||""} onChange={e=>setSt({...st,explorer_base:e.target.value})} onBlur={e=>patch({explorer_base:e.target.value})}/></div>
      </div>
      <div className="label" style={{marginTop:12}}>VoiceRegistry 주소 (소유권 NFT)</div>
      <input className="field" placeholder="0x..." value={st.registry_address||""} onChange={e=>setSt({...st,registry_address:e.target.value})} onBlur={e=>patch({registry_address:e.target.value})}/>
      <div className="grid g2" style={{marginTop:12}}>
        <div><div className="label">VoiceCoin 주소 (선택)</div><input className="field" placeholder="0x..." value={st.coin_address||""} onChange={e=>setSt({...st,coin_address:e.target.value})} onBlur={e=>patch({coin_address:e.target.value})}/></div>
        <div><div className="label">VoiceLicense 주소 (선택)</div><input className="field" placeholder="0x..." value={st.license_address||""} onChange={e=>setSt({...st,license_address:e.target.value})} onBlur={e=>patch({license_address:e.target.value})}/></div>
      </div>
      <div className="mut" style={{fontSize:12.5,marginTop:10,lineHeight:1.6}}>주소는 <code>blockchain/</code> 컨트랙트 배포 후 얻습니다. 형식이 틀리면 저장되지 않아요(서버 검증).</div>
    </div>
    <div className="card">
      <div className="sec"><span className="dot"/>삭제권</div>
      <div className="mut" style={{fontSize:13.5,marginBottom:14,lineHeight:1.5}}>음성은 민감 정보예요. 내가 등록·보유한 목소리는 언제든 완전 삭제할 수 있습니다.</div>
      {mine.length===0 ? <div className="mut">삭제할 목소리가 없습니다.</div> :
        mine.map(v=><div key={v.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderTop:"1px solid var(--line)"}}>
          <Avatar seed={v.id} size={34} radius={11}/>
          <div style={{flex:1}}><b>{v.display_name}</b> <span className="pill">{v.accent}</span></div>
          <button className="btn sm outline" onClick={()=>del(v)}>삭제</button></div>)}
      {msg && <div className="ok" style={{marginTop:12,fontSize:13.5,fontWeight:600}}>{msg}</div>}
    </div>
    <div className="card" style={{marginTop:14}}>
      <div className="sec"><span className="dot"/>안전 · 정책</div>
      <div className="mut" style={{fontSize:13.5,lineHeight:1.7}}>
        · 동의 완료된 목소리만 회화에 사용됩니다.<br/>
        · 대화 입력은 사칭·혐오·미성년·사기·자해에 대해 자동 차단됩니다.<br/>
        · 모든 합성 음성에는 식별용 워터마크 메타데이터가 기록됩니다.
      </div>
    </div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
